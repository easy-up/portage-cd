gitleaks:
    limitEnabled: false
grype:
    # belay_main: reconciled with main's .gatecheck.yml — explicit per-CVE
    # acceptance with documented reasoning, instead of a blanket high-severity
    # cap. Every accepted CVE below is a transitive dependency embedded in the
    # security tools portage bundles (docker/buildkit/oras/syft/etc.) or an OS
    # package — none are in portage's own source. Revisit when the bundled
    # tool versions are bumped; entries with an available fix should be
    # removed once the tool upgrade lands.
    cveRiskAcceptance:
        enabled: true
        cves:
            # --- Triaged on main (ported verbatim from main/.gatecheck.yml) ---
            # Grype mis-reports this vulnerability which was fixed in clamav >= 0.99.0 even though the apk installed version is >= 1.2.2
            - id: CVE-2016-1405
            # Docker CLI issue only affects Windows
            - id: CVE-2025-15558
            # Docker Buildx plugin issue (in grpc lib), would only effect a server, we are only using the CLI as a client.
            - id: CVE-2026-33186
            # Docker Buildx plugin issue (in opentelemetry lib). Not exploitable.
            - id: CVE-2026-24051
            # Docker Buildx plugin issue (in buildkit). Not exploitable since we aren't running or exposing the Buildkit daemon.
            - id: CVE-2026-33748
            - id: CVE-2026-34040
            # No fix available
            - id: CVE-2026-2673
            - id: CVE-2026-27135
            # --- belay_main: newer CVEs (disclosed Apr-May 2026), surfaced by a
            #     fresher grype DB. Same class as the main-triaged entries above:
            #     transitive deps in bundled tooling. main has not rebuilt since
            #     2026-03-29 so it has not yet triaged these. ---
            # OpenTelemetry lib in bundled buildx tooling — same class as CVE-2026-24051. Fix in otel >= 1.41.0 / sdk >= 1.43.0; pending tool bump.
            - id: CVE-2026-29181
            - id: CVE-2026-39883
            # Buildkit — same class as CVE-2026-33748; Buildkit daemon is not run or exposed. Fix in buildkit >= 0.28.1; pending tool bump.
            - id: CVE-2026-33747
            # docker/docker — same class as CVE-2026-34040; no upstream fix available.
            - id: CVE-2026-41567
            - id: CVE-2026-42306
            # Alpine git package; upstream fix status unknown. Interim acceptance.
            - id: CVE-2026-32631
            # go-jose/v4 — transitive dep of oras registry auth. Fix in 4.1.4; pending tool bump.
            - id: CVE-2026-34986
            # moby/spdystream — transitive dep in bundled docker/k8s tooling. Fix in 0.5.1; pending tool bump.
            - id: CVE-2026-35469
            # go-git/go-billy — transitive dep in bundled tooling. Fix in 5.9.0; pending tool bump.
            - id: CVE-2026-44973
            # go-git/go-git — transitive dep in bundled tooling. Fix in 5.19.0; pending tool bump.
            - id: CVE-2026-45022
            # hashicorp/go-getter — transitive dep in bundled tooling. Fix in 1.8.6; pending tool bump.
            - id: CVE-2026-4660
    # Critical kept as a hard gate at 0 — any unaccepted critical must fail the
    # build and be reviewed. The high cap is intentionally dropped (main has no
    # severity cap); cveRiskAcceptance above is the gate for high-severity CVEs.
    severityLimit:
        critical:
            enabled: true
            limit: 0
semgrep:
    impactRiskAcceptance:
        enabled: true
        low: true
    severityLimit:
        error:
            enabled: true
            limit: 5
